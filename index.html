<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APK Checker — KSPPS Artha Bahana Syariah</title>
<style>
  :root{
    --ink:#0d2620; --paper:#f2f8f4; --card:#ffffff; --line:#d3e4db;
    --accent:#0a6e5c; --accent-dark:#07473b; --cyan:#00ffff; --green:#00ff00;
    --muted:#5a746b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Segoe UI',system-ui,Arial,sans-serif; background:var(--paper);
    color:var(--ink);
  }
  header{
    background:linear-gradient(135deg,var(--accent-dark),var(--accent));
    color:#fff; padding:36px 20px 44px; text-align:center;
  }
  header h1{margin:0 0 6px; font-size:26px; letter-spacing:.2px;}
  header p{margin:0; opacity:.85; font-size:14px;}
  main{
    max-width:640px; margin:-26px auto 60px; padding:0 20px;
  }
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:28px; box-shadow:0 10px 30px -18px rgba(10,60,45,.35); margin-bottom:20px;
  }
  .drop{
    border:2px dashed var(--line); border-radius:12px; padding:30px 20px; text-align:center;
    cursor:pointer; transition:.15s border-color,.15s background;
  }
  .drop.drag{border-color:var(--accent); background:#eef8f3;}
  .drop input{display:none;}
  .drop .hint{font-size:13px; color:var(--muted); margin-top:6px;}
  .filename{margin-top:12px; font-size:13.5px; color:var(--accent-dark); font-weight:600;}
  button{
    margin-top:20px; width:100%; padding:13px; border:none; border-radius:9px;
    background:var(--accent); color:#fff; font-size:15px; font-weight:600; cursor:pointer;
    transition:background .15s;
  }
  button:hover:not(:disabled){background:var(--accent-dark);}
  button:disabled{opacity:.45; cursor:default;}
  .legend{display:flex; gap:16px; margin-top:16px; font-size:12.5px; color:var(--muted); flex-wrap:wrap;}
  .swatch{width:12px; height:12px; border-radius:3px; display:inline-block; margin-right:5px; vertical-align:-1px; border:1px solid rgba(0,0,0,.15);}
  #status{margin-top:16px; font-size:13.5px; white-space:pre-wrap; line-height:1.5;}
  table{width:100%; border-collapse:collapse; margin-top:14px; font-size:12.5px;}
  th,td{border:1px solid var(--line); padding:6px 8px; text-align:left;}
  th{background:#eef5f1;}
  .config-note{
    font-size:12px; color:var(--muted); background:#fbf6e8; border:1px solid #ecdca6;
    border-radius:8px; padding:10px 12px; margin-bottom:18px;
  }
  code{background:#eef3f0; padding:1px 5px; border-radius:4px; font-size:11.5px;}

  .warn-box{
    margin-top:18px; border:1px solid #ecc6a6; background:#fdf3ea; border-radius:10px;
    padding:12px 14px;
  }
  .warn-box h4{margin:0 0 6px; font-size:13.5px; color:#8a4b12;}
  .warn-box p{margin:0 0 8px; font-size:12px; color:var(--muted);}
  .warn-list{list-style:none; margin:0; padding:0; font-size:12.5px;}
  .warn-list li{
    padding:7px 0; border-top:1px solid #f1ddc7;
  }
  .warn-list li:first-child{border-top:none;}
  .warn-name{font-weight:600; color:var(--ink);}
  .warn-hint{display:block; margin-top:3px; color:#8a4b12; font-size:11.5px;}
  .warn-hint.none{color:var(--muted);}
</style>
</head>
<body>
<header>
  <h1>APK Checker</h1>
  <p>Pencocokan mutasi harian pinjaman — Artha Bahana Syariah</p>
</header>

<main>
  <div class="card">
    <div class="config-note" id="configNote">
      Web app belum dikonfigurasi. Isi <code>WEB_APP_URL</code> di bagian atas file ini
      dengan URL hasil deploy Apps Script (Deploy → New deployment → Web app).
    </div>

    <label class="drop" id="drop">
      <input type="file" id="file" accept="application/pdf">
      <div><strong>Klik atau seret file PDF</strong> ke sini</div>
      <div class="hint">Laporan Mutasi Harian Pinjaman (.pdf)</div>
      <div class="filename" id="filename"></div>
    </label>

    <div class="legend">
      <span><span class="swatch" style="background:var(--cyan)"></span>Pokok cocok dengan Saldo Awal</span>
      <span><span class="swatch" style="background:var(--green)"></span>Basil cocok dengan Pot. Basil</span>
    </div>

    <button id="run" disabled>Proses & Cocokkan</button>
    <div id="status"></div>
  </div>
</main>

<script>
  // -------------------------------------------------------------------
  // GANTI dengan URL web app Apps Script hasil deploy, contoh:
  // https://script.google.com/macros/s/AKfycb.../exec
  // -------------------------------------------------------------------
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwrUQRrQ0J3YdlxYdq3ECvg5j_Kd4erplvEIMZa6krQAyVF0p5pkVMK5LuOUoTrRLgi/exec";

  const fileInput = document.getElementById('file');
  const drop = document.getElementById('drop');
  const runBtn = document.getElementById('run');
  const statusEl = document.getElementById('status');
  const filenameEl = document.getElementById('filename');
  const configNote = document.getElementById('configNote');
  let selectedFile = null;

  if (WEB_APP_URL) configNote.style.display = 'none';

  drop.addEventListener('click', () => fileInput.click());
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('drag');
    if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => { if (e.target.files.length) setFile(e.target.files[0]); });

  function setFile(f) {
    selectedFile = f;
    filenameEl.textContent = f.name;
    runBtn.disabled = false;
  }

  runBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    if (!WEB_APP_URL) {
      statusEl.textContent = 'WEB_APP_URL belum diisi. Lihat catatan kuning di atas.';
      return;
    }
    runBtn.disabled = true;
    statusEl.textContent = 'Membaca PDF...';

    try {
      const base64 = await fileToBase64(selectedFile);
      statusEl.textContent = 'Mengirim ke server & mencocokkan spreadsheet...';

      const res = await fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // hindari CORS preflight
        body: JSON.stringify({ fileName: selectedFile.name, base64: base64 })
      });
      const data = await res.json();

      if (!data.ok) throw new Error(data.error || 'Gagal memproses di server.');
      renderResult(data);
    } catch (err) {
      statusEl.textContent = 'Gagal: ' + err.message;
    } finally {
      runBtn.disabled = false;
    }
  });

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderResult(data) {
    const s = data.summary;
    let text = 'Selesai.\n' +
      'Baris terbaca dari PDF: ' + s.pdfRowsRead + '\n' +
      'Baris cocok di spreadsheet utama: ' + s.mainSheetMatched + '\n' +
      'Baris cocok di sheet Randublatung: ' + s.secondSheetMatched;
    statusEl.textContent = text;

    if (data.rows && data.rows.length) {
      let table = '<table><tr><th>Nama</th><th>Baris</th><th>Pokok</th><th>Basil</th></tr>';
      data.rows.forEach(r => {
        const viaNote = r.matchedVia === '2kata'
          ? ' <span style="color:#8a4b12; font-weight:600;" title="Dicocokkan lewat 2 kata pertama (nama di PDF kepotong)">(≈2 kata)</span>'
          : '';
        table += '<tr><td>' + escapeHtml(r.nama) + viaNote + '</td><td>' + escapeHtml(r.row) + '</td><td>' +
          (r.pokokMatch ? '✓' : '') + '</td><td>' + (r.basilMatch ? '✓' : '') + '</td></tr>';
      });
      table += '</table>';
      statusEl.insertAdjacentHTML('beforeend', table);
    }

    // Nama dari PDF yang sama sekali tidak ketemu di kedua spreadsheet.
    // Ini bukan error -- cuma penanda supaya baris yang "hilang" dari
    // laporan di atas tidak diam-diam kelewat tanpa keterangan.
    if (data.namaTidakKetemu && data.namaTidakKetemu.length) {
      let box = '<div class="warn-box">' +
        '<h4>⚠ ' + data.namaTidakKetemu.length + ' nama dari PDF tidak ketemu di spreadsheet mana pun</h4>' +
        '<p>Biasanya karena nama di PDF kepotong (kolom lebar tetap) sehingga beda persis dari nama lengkap di spreadsheet, atau nasabahnya memang belum ada barisnya.</p>' +
        '<ul class="warn-list">';
      data.namaTidakKetemu.forEach(n => {
        box += '<li><span class="warn-name">' + escapeHtml(n.nama) + '</span>';
        if (n.kemungkinanTerpotong && n.kemungkinanNamaLengkap.length) {
          box += '<span class="warn-hint">Kemungkinan nama lengkapnya di spreadsheet: ' +
            n.kemungkinanNamaLengkap.map(escapeHtml).join(', ') + '</span>';
        } else {
          box += '<span class="warn-hint none">Tidak ada nama mirip yang ketemu di spreadsheet — cek manual.</span>';
        }
        box += '</li>';
      });
      box += '</ul></div>';
      statusEl.insertAdjacentHTML('beforeend', box);
    }
  }
</script>
</body>
</html>
